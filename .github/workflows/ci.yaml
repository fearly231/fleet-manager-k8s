name: GitOps Validation CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate:
    name: Validate Kubernetes Manifests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        overlay: [dev, ephemeral, prod]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Setup Kubeconform
        uses: bmuschko/setup-kubeconform@v1

      - name: Build ${{ matrix.overlay }} overlay
        run: |
          kustomize build manifests/fleet-app/overlays/${{ matrix.overlay }} > ${{ matrix.overlay }}.yaml

      - name: Validate ${{ matrix.overlay }} overlay
        run: |
          kubeconform \
            -strict \
            -summary \
            -skip ExternalSecret,ClusterSecretStore \
            -kubernetes-version 1.29.0 \
            ${{ matrix.overlay }}.yaml

  validate-argo:
    name: Validate ArgoCD Manifests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Kubeconform
        uses: bmuschko/setup-kubeconform@v1

      - name: Validate ArgoCD apps
        run: |
          for f in apps/dev/*.yaml bootstrap-*.yaml; do
            echo "--- Validating $f ---"
            kubeconform \
              -strict \
              -summary \
              -skip Application,ApplicationSet,AppProject \
              "$f" || true
          done

      - name: YAML lint
        run: |
          find . -name '*.yaml' -not -path './.git/*' | while read f; do
            python3 -c "import yaml; yaml.safe_load(open('$f'))" 2>&1 && echo "OK: $f" || echo "FAIL: $f"
          done
