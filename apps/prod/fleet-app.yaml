apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: fleet-app
  namespace: argocd
spec:
  project: default
  source:
      repoURL: 'https://github.com/fearly231/fleet-manager-k8s.git'
      targetRevision: HEAD
      path: manifests/fleet-app/overlays/prod
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
        automated:
          prune: true
          selfHeal: true
          
          