apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
    name: root-app
    namespace: argocd
spec:
  project: default  # Root app uses default — it only deploys to argocd namespace
  source:
    repoURL: 'https://github.com/fearly231/fleet-manager-k8s.git'
    targetRevision: HEAD
    path: apps/dev
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: argocd
  syncPolicy:
    automated:
        prune: true
        selfHeal: true