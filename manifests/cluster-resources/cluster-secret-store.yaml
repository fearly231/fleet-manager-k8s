# ClusterSecretStore is cluster-scoped and should be deployed ONCE,
# not per-application. Deploy this separately via:
#   kubectl apply -f manifests/cluster-resources/cluster-secret-store.yaml
# Or manage via a dedicated ArgoCD Application.
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secretsmanager
spec:
  provider:
    aws:
      service: SecretsManager
      region: eu-central-1
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
