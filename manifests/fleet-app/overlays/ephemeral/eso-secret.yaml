apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: fleet-backend-secrets-es
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: fleet-backend-secrets
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        DATABASE_URL: "postgresql+psycopg://fleet_ephemeral:{{ .pg_password }}@postgres-service:5432/fleetdb"
        SECRET_KEY: "ephemeral-{{ .jwt_secret | toString | trunc 16 }}-not-for-production"
        DEFAULT_ADMIN_PASSWORD: "ephemeral-admin-{{ .admin_password | toString | trunc 8 }}"
  dataFrom:
    - extract:
        key: ephemeral-fleet-app-secrets
