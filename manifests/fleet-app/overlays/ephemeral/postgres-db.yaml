apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
type: Opaque
stringData:
  POSTGRES_USER: "fleet_ephemeral"
  POSTGRES_PASSWORD: ""  # Will be generated per-environment — see note below
  POSTGRES_DB: "fleetdb"
  # NOTE: For ephemeral environments, the ApplicationSet generates a random-enough
  # password per PR using the PR number + head_sha. See ephemeral-apps.yaml patches.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-ephemeral
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-ephemeral
  template:
    metadata:
      labels:
        app: postgres-ephemeral
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_PASSWORD
          ports:
            - containerPort: 5432
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
          readinessProbe:
            exec:
              command:
              - pg_isready
              - -U
              - fleet_ephemeral
              - -d
              - fleetdb
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
              - pg_isready
              - -U
              - fleet_ephemeral
              - -d
              - fleetdb
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
spec:
  ports:
    - port: 5432
      targetPort: 5432
  selector:
    app: postgres-ephemeral
